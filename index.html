<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <script>document.title = window.location.hostname;</script> <!-- Runs immediately when the head loads to prevent visual lag -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>

	<h3>Basic login form</h3>
    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="Username" autocomplete="username" required />
        <input type="password" name="password" placeholder="Password" autocomplete="current-password" required />

        <!-- Turnstile widget with basic configuration -->
        <div class="cf-turnstile" data-sitekey="0x4AAAAAAD1IW7_s1ItoAmrV"></div>
        <button type="submit">Log in</button>
    </form>
	<br><hr><br>

	<h3>Advanced form with callbacks:</h3>
    <form action="/submit" method="POST">
      <label for="name">Name:</label><br />
      <input type="text" id="name" name="name" required /><br />
      <label for="email">Email:</label><br />
      <input type="email" id="email" name="email" required /><br />
      <!-- Turnstile Widget -->
      <div class="cf-turnstile" data-sitekey="0x4AAAAAAD1IW7_s1ItoAmrV"></div>
      <br />
      <button type="submit">Submit</button>
    </form>
	<br><hr><br>

	<h3>Advanced form with callbacks</h3>
	<form action="/contact" method="POST" id="contact-form">
	<input type="email" name="email" placeholder="Email" required />
	<textarea name="message" placeholder="Message" required></textarea>
	<!-- Widget with callbacks and custom configuration -->
	<div
		class="cf-turnstile"
		data-sitekey="0x4AAAAAAD1IW7_s1ItoAmrV"
		data-theme="auto"
		data-size="flexible"
		data-callback="onTurnstileSuccess"
		data-error-callback="onTurnstileError"
		data-expired-callback="onTurnstileExpired"
	></div>
	<button type="submit" id="submit-btn" disabled>Send Message</button>
	</form>
	<script>
		function onTurnstileSuccess(token) {
			console.log("Turnstile success:", token);
			document.getElementById("submit-btn").disabled = false;
		}
		function onTurnstileError(errorCode) {
			console.error("Turnstile error:", errorCode);
			document.getElementById("submit-btn").disabled = true;
		}
		function onTurnstileExpired() {
			console.warn("Turnstile token expired");
			document.getElementById("submit-btn").disabled = true;
		}
	</script>
    </form>
	<br><hr><br>

	<h3>Multiple widgets with different configurations</h3>
	<!-- Compact widget for newsletter signup -->
	<form action="/newsletter" method="POST">
	<input type="email" name="email" placeholder="Email" />
	<div
		class="cf-turnstile"
		data-sitekey="0x4AAAAAAD1IW7_s1ItoAmrV"
		data-size="compact"
		data-action="newsletter"
	></div>
	<button type="submit">Subscribe</button>
    </form>
	<br><hr><br>

	<h2>Normal widget for contact form</h2>
	<form action="/contact" method="POST">
	<input type="text" name="name" placeholder="Name" />
	<input type="email" name="email" placeholder="Email" />
	<textarea name="message" placeholder="Message"></textarea>
	<div
		class="cf-turnstile"
		data-sitekey="0x4AAAAAAD1IW7_s1ItoAmrV"
		data-action="contact"
		data-theme="dark"
	></div>
	<button type="submit">Send</button>
    </form>
	<br><hr><br>

	<h2>Multiple widgets with different configurations</h2>
	<form action="/submit" method="POST">
		<input type="text" name="data" />
		<div class="cf-turnstile" data-sitekey="0x4AAAAAAD1IW7_s1ItoAmrV"></div>
		<!-- Hidden field automatically added: -->
		<!-- <input type="hidden" name="cf-turnstile-response" value="TOKEN_VALUE" /> -->
		<button type="submit">Submit</button>
    </form>
	<br><hr><br>
	
  </body>
</html>

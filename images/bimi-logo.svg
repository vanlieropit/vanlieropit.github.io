<?xml version="1.0" encoding="utf-8"?>
<svg version="1.2" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 256 256" width="256" height="256" overflow="visible" xml:space="preserve">
  <!-- Achtergrond -->
  <rect width="256" height="256" rx="40" fill="#0A1E6B" />
  
  <!-- Subtiele decoratieve lijn boven tekst -->
  <line x1="64" y1="32" x2="192" y2="32" stroke="#90CAF9" stroke-width="1.5" opacity="0.4" />
  
  <!-- Tekst -->
  <text x="128" y="58" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#90CAF9" text-anchor="middle" letter-spacing="6">VAN LIEROP</text>
  
  <!-- Hoofdletter T – breder en beter geproportioneerd -->
  <rect x="108" y="78" width="40" height="130" rx="4" fill="#FFFFFF" />
  <rect x="58" y="78" width="130" height="32" rx="4" fill="#FFFFFF" />
  
  <!-- Hoofdletter I – breder en uitgelijnd met de T -->
  <rect x="58" y="120" width="40" height="88" rx="4" fill="#FFFFFF" />
  
  <!-- Decoratieve lijn onder de letters -->
  <line x1="58" y1="222" x2="198" y2="222" stroke="#90CAF9" stroke-width="1.5" opacity="0.4" />
</svg>
